# 이 내용을 .streamlit/secrets.toml (로컬) 또는
# Streamlit Cloud → Settings → Secrets 에 붙여넣고 값을 채우세요.
# 서비스 계정 JSON 파일의 내용을 그대로 옮기면 됩니다.

sheet_id = "여기에_구글_스프레드시트_ID"

[gcp_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "..."
private_key = "-----BEGIN PRIVATE KEY-----\n...여러_줄...\n-----END PRIVATE KEY-----\n"
client_email = "your-sa@your-project.iam.gserviceaccount.com"
client_id = "..."
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "..."

# (선택) AI 힌트 기능을 쓰려면 아래 한 줄도 추가
# ANTHROPIC_API_KEY = "sk-ant-..."
